<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail - JerseyPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container container">
      <a href="index.html" class="logo">JerseyPro</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
      <div class="cart-icon" title="View Cart">🛒
        <span class="cart-badge"></span>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="product-detail">
      <img id="detail-image" src="" alt="" class="detail-image">
      <div>
        <h1 id="detail-name"></h1>
        <div id="detail-price" class="product-price mb-2"></div>
        <p id="detail-desc"></p>
        
        <div class="size-selector" id="size-selector"></div>
        
        <button class="btn" onclick="addToCartFromDetail()" id="add-cart-btn">Add to Cart</button>
        
        <a href="products.html" class="btn" style="margin-top: 1rem; background: var(--bg-secondary); border: 2px solid var(--neon-green);">← Back to Products</a>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
